<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" aria-hidden="true">
  <rect width="64" height="64" rx="10" fill="#1565c0"/>
  <!-- Clock face -->
  <circle cx="32" cy="32" r="25" fill="#ffffff" stroke="#0d47a1" stroke-width="2.5"/>
  <!-- Hour markers -->
  <line x1="32" y1="9"  x2="32" y2="13" stroke="#0d47a1" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="55" y1="32" x2="51" y2="32" stroke="#0d47a1" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="55" x2="32" y2="51" stroke="#0d47a1" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="9"  y1="32" x2="13" y2="32" stroke="#0d47a1" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand (pointing to 12) -->
  <line x1="32" y1="32" x2="32" y2="12" stroke="#1565c0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Hour hand (pointing to 3) -->
  <line x1="32" y1="32" x2="48" y2="32" stroke="#0d47a1" stroke-width="4" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#0d47a1"/>
</svg>
